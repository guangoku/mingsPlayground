<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Atolla Ocean">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#03283f"/>
      <stop offset="0.55" stop-color="#063b56"/>
      <stop offset="1" stop-color="#021a2b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.42">
      <stop offset="0" stop-color="#ff6b6b" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ff5d8f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff5d8f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bell" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#ff9aa8"/>
      <stop offset="0.45" stop-color="#e84a6f"/>
      <stop offset="1" stop-color="#9c1f4a"/>
    </radialGradient>
    <linearGradient id="textScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#021a2b" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#021a2b" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#021a2b" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- ambient bioluminescent plankton -->
  <g fill="#bfefff">
    <circle cx="120" cy="200" r="2.5" opacity="0.7"/>
    <circle cx="680" cy="170" r="2" opacity="0.6"/>
    <circle cx="730" cy="320" r="3" opacity="0.5"/>
    <circle cx="90" cy="430" r="2" opacity="0.5"/>
    <circle cx="650" cy="470" r="2.5" opacity="0.6"/>
    <circle cx="170" cy="540" r="2" opacity="0.5"/>
    <circle cx="560" cy="560" r="2.5" opacity="0.55"/>
    <circle cx="260" cy="270" r="1.8" opacity="0.5"/>
  </g>

  <!-- soft glow behind the jellyfish -->
  <circle cx="400" cy="300" r="300" fill="url(#glow)"/>

  <!-- Atolla jellyfish -->
  <g transform="translate(400 285)">
    <!-- tentacles -->
    <g stroke="#ff7a93" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85">
      <path d="M-95 70 C -120 200, -70 320, -100 430"/>
      <path d="M-55 85 C -70 230, -35 350, -55 470"/>
      <path d="M-18 92 C -22 240, -10 380, -18 500"/>
      <path d="M18 92 C 22 240, 10 380, 18 500"/>
      <path d="M55 85 C 70 230, 35 350, 55 470"/>
      <path d="M95 70 C 120 200, 70 320, 100 430"/>
    </g>
    <path d="M0 95 C 8 280, -8 430, 4 560" stroke="#ffd0d8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- bell -->
    <path d="M-150 40 C -150 -110, 150 -110, 150 40 C 150 70, 90 92, 0 92 C -90 92, -150 70, -150 40 Z" fill="url(#bell)"/>
    <path d="M-150 40 C -90 92, 90 92, 150 40" stroke="#ffd9e0" stroke-width="3" fill="none" opacity="0.55"/>
    <g stroke="#ffccd5" stroke-width="3" opacity="0.5">
      <line x1="-110" y1="-40" x2="-95" y2="55"/>
      <line x1="-60" y1="-70" x2="-52" y2="70"/>
      <line x1="0" y1="-82" x2="0" y2="78"/>
      <line x1="60" y1="-70" x2="52" y2="70"/>
      <line x1="110" y1="-40" x2="95" y2="55"/>
    </g>
  </g>

  <!-- scrim so the wordmark stays legible over tentacles -->
  <rect x="0" y="470" width="800" height="200" fill="url(#textScrim)"/>

  <!-- wordmark (kept within the safe center band so it survives card cropping) -->
  <g text-anchor="middle" font-family="'Open Sans', 'Helvetica Neue', Arial, sans-serif">
    <text x="400" y="560" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="6">ATOLLA OCEAN</text>
    <text x="400" y="600" fill="#9fd6ea" font-size="23" font-weight="500" letter-spacing="2">AI field guide for divers</text>
  </g>
</svg>
